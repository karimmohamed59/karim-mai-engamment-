<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Karim & Mai Engagement</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #f3ebee;
    text-align: center;
    font-family: 'Poppins', sans-serif;
    overflow-x: hidden;
}

/* GOLD SHIMMER */
.gold {
    background: linear-gradient(90deg, #d4af37, #fff8dc, #d4af37);
    background-size: 200% auto;
    -webkit-background-clip: text;
    color: transparent;
    animation: shimmer 3s linear infinite;
}

@keyframes shimmer {
    0% { background-position: 0% }
    100% { background-position: 200% }
}

/* Envelope wrapper */
.envelope-wrapper {
    margin-top: 80px;
}

/* Open text */
.open-text {
    display: inline-block;
    background: white;
    padding: 10px 25px;
    border-radius: 25px;
    margin-bottom: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.15);
}

/* Envelope */
.envelope {
    position: relative;
    width: 340px;
    height: 220px;
    margin: auto;
    background: #f0f0f0;
    border-radius: 18px;
    box-shadow: 0 20px 45px rgba(0,0,0,0.25);
    cursor: pointer;
    overflow: hidden;
}

/* Flap */
.flap {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #f8a5a5;
    clip-path: polygon(0 0, 100% 0, 50% 70%);
    transform-origin: top;
    transition: 0.7s;
    z-index: 2;
}

.envelope.open .flap {
    transform: rotateX(180deg);
}

/* LETTER (SLIDING OUT) */
.inner-letter {
    position: absolute;
    width: 90%;
    height: 140px;
    background: white;
    left: 5%;
    bottom: 10px;
    border-radius: 10px;
    transition: 1s;
    z-index: 1;
}

.envelope.open .inner-letter {
    transform: translateY(-180px);
}

/* Card */
.card {
    display: none;
    margin: 60px auto;
    width: 360px;
    background: #f0f0f0;
    padding: 30px;
    border-radius: 25px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

/* Title with sparkle */
.title {
    font-family: 'Great Vibes', cursive;
    font-size: 38px;
    position: relative;
}

/* Sparkle */
.sparkle::after {
    content: "✨";
    position: absolute;
    right: -25px;
    top: 0;
    animation: sparkle 1s infinite alternate;
}

@keyframes sparkle {
    from { opacity: 0.3; transform: scale(1);}
    to { opacity: 1; transform: scale(1.4);}
}

/* Ring */
.ring {
    font-size: 40px;
    margin: 10px 0;
}

/* Typing */
.typing {
    min-height: 22px;
    margin: 8px 0;
}

/* Buttons */
button {
    margin: 10px;
    padding: 10px 20px;
    border-radius: 25px;
    border: none;
    background: #e91e63;
    color: white;
    cursor: pointer;
}

/* Hearts */
.heart {
    position: fixed;
    bottom: -10px;
    width: 12px;
    height: 12px;
    background: red;
    transform: rotate(45deg);
    animation: float 6s linear infinite;
}

.heart::before,
.heart::after {
    content: "";
    position: absolute;
    width: 12px;
    height: 12px;
    background: red;
    border-radius: 50%;
}

@keyframes float {
    from { transform: translateY(0) rotate(45deg); }
    to { transform: translateY(-100vh) rotate(45deg); }
}
</style>
</head>

<body>

<div class="envelope-wrapper">
    <div class="open-text">💌 Tap to Open</div>

    <div class="envelope" onclick="openEnvelope()">
        <div class="flap"></div>
        <div class="inner-letter"></div>
    </div>
</div>

<div id="card" class="card">
    <div class="title gold sparkle">Karim & Mai</div>

    <div class="ring">💍</div>

    <div id="line1" class="typing"></div>
    <div id="line2" class="typing"></div>
    <div id="line3" class="typing"></div>
    <div id="line4" class="typing"></div>

    <div id="countdown"></div>

    <a href="https://maps.google.com" target="_blank">View Location</a>

    <hr>

    <div><b>Will you join us?</b></div>
    <button>I’m coming ❤️</button>
    <button>Can’t make it 😔</button>
</div>

<script>
function openEnvelope() {
    document.querySelector('.envelope').classList.add('open');
    setTimeout(() => {
        document.getElementById('card').style.display = 'block';
        startTyping();
    }, 1200);
}

/* Typing */
function typeLine(id, text, delay) {
    let i = 0;
    setTimeout(() => {
        let interval = setInterval(() => {
            document.getElementById(id).innerHTML += text.charAt(i);
            i++;
            if (i >= text.length) clearInterval(interval);
        }, 35);
    }, delay);
}

function startTyping() {
    typeLine("line1", "With joy in our hearts,", 0);
    typeLine("line2", "we invite you to celebrate our engagement 💖", 1500);
    typeLine("line3", "📅 April 18, 2026", 3500);
    typeLine("line4", "📍 Cairo, Egypt", 5000);
}

/* Hearts */
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}, 300);
</script>

</body>
</html>
