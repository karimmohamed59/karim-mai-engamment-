<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karim & Mai Engagement</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Playfair Display', serif;
  background: linear-gradient(to bottom, #ffffff, #f8f5f2);
  text-align: center;
  overflow-x: hidden;
}

/* Secret counter */
#secretCounter {
  position: fixed;
  top: 10px;
  left: 10px;
  font-size: 13px;
  opacity: 0.4;
}

/* Envelope */
.envelope {
  width: 260px;
  height: 160px;
  background: #fff;
  margin: 120px auto 0;
  position: relative;
  border-radius: 12px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
  overflow: hidden;
}

/* Flap */
.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg,#e8d5c4,#d4af37);
  clip-path: polygon(0 0, 50% 50%, 100% 0);
  transform-origin: top;
  transition: 0.8s;
  z-index: 3;
}

.open .flap {
  transform: rotateX(-180deg);
}

/* Pull card */
.inner-card {
  position: absolute;
  width: 85%;
  left: 7.5%;
  height: 120px;
  background: white;
  top: 30px;
  border-radius: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  transition: transform 0.3s;
  z-index: 2;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  color:#999;
}

/* Main card */
.card {
  width: 90%;
  max-width: 420px;
  background: white;
  margin: 20px auto;
  padding: 30px 20px;
  border-radius: 16px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.15);
  display: none;
  border: 1px solid #eee;
}

.show {
  display: block;
  animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(30px);}
  to {opacity:1; transform: translateY(0);}
}

h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 38px;
  color: #c6a769;
}

/* Divider */
.divider {
  width: 60px;
  height: 2px;
  background: #d4af37;
  margin: 15px auto;
}

/* Buttons */
button {
  padding: 12px 22px;
  border: none;
  background: #d4af37;
  color: white;
  border-radius: 30px;
  cursor: pointer;
  margin: 6px;
  font-size: 14px;
}

/* Countdown */
#countdown {
  margin-top: 15px;
  font-size: 16px;
  color:#777;
}
</style>
</head>

<body>

<div id="secretCounter">• <span id="count">0</span></div>

<div class="envelope" id="env">
  <div class="flap"></div>
  <div class="inner-card" id="pullCard">Pull me ↑</div>
</div>

<div id="card" class="card">
  <h1>Karim & Mai</h1>
  <div class="divider"></div>
  <p id="message"></p>

  <p><strong>April 18, 2026</strong></p>
  <p>Cairo, Egypt</p>

  <div id="countdown"></div>

  <br>

  <button onclick="rsvp(true)">I’m coming</button>
  <button onclick="rsvp(false)">Can’t make it</button>

  <p id="responseMsg"></p>
</div>

<script>

// Counter
let count = localStorage.getItem("count") || 0;
document.getElementById("count").innerText = count;

// RSVP
function rsvp(isComing){
  if(localStorage.getItem("answered")) return;
  localStorage.setItem("answered",true);

  if(isComing){
    count++;
    localStorage.setItem("count",count);
    document.getElementById("count").innerText = count;

    document.getElementById("responseMsg").innerText =
    "Ooooh yeah 😍✨ This will be unforgettable with you there!";
  }else{
    document.getElementById("responseMsg").innerText =
    "We’ll truly miss you 💔 but you’ll be in our hearts";
  }
}

// TYPE TEXT (FIXED)
let text = "With joy in our hearts, we invite you to celebrate our engagement.";
let i=0;
function typeText(){
  let el = document.getElementById("message");
  el.innerHTML="";
  function t(){
    if(i<text.length){
      el.innerHTML += text[i];
      i++;
      setTimeout(t,35);
    }
  }
  t();
}

// Pull interaction
let card = document.getElementById("pullCard");
let env = document.getElementById("env");
let startY = 0;
let moved = false;

card.addEventListener("touchstart",e=>{
  startY = e.touches[0].clientY;
});

card.addEventListener("touchmove",e=>{
  let move = startY - e.touches[0].clientY;
  if(move > 20){
    card.style.transform = `translateY(-${move}px)`;
    moved = true;
  }
});

card.addEventListener("touchend",openFull);

card.addEventListener("mousedown",e=>{
  startY = e.clientY;
  document.onmousemove = (ev)=>{
    let move = startY - ev.clientY;
    if(move>20){
      card.style.transform = `translateY(-${move}px)`;
      moved=true;
    }
  };
  document.onmouseup = openFull;
});

function openFull(){
  if(!moved) return;
  env.classList.add("open");

  setTimeout(()=>{
    document.getElementById("card").classList.add("show");
    typeText();
    startCountdown();
  },700);

  document.onmousemove=null;
}

// Countdown
function startCountdown(){
  let date = new Date("April 18, 2026 20:00:00").getTime();
  setInterval(()=>{
    let now = new Date().getTime();
    let diff = date-now;

    let d = Math.floor(diff/(1000*60*60*24));
    let h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    let m = Math.floor((diff%(1000*60*60))/(1000*60));

    document.getElementById("countdown").innerHTML =
    d+" days • "+h+" hrs • "+m+" min";
  },1000);
}

</script>

</body>
</html>
