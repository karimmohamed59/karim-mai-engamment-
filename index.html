<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Karim & Mai Engagement❤️</title>

<!-- Premium Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #f3ebee;
    text-align: center;
    font-family: 'Poppins', sans-serif;
    overflow-x: hidden;
}

/* Envelope */
.envelope {
    margin-top: 70px;
    position: relative;
    width: 280px;
    height: 180px;
    background: #f0f0f0;
    border-radius: 15px;
    margin-left: auto;
    margin-right: auto;
    cursor: pointer;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
}
/* Wrapper to control spacing */
.envelope-wrapper {
    margin-top: 80px;
}

/* Open text (FIXED POSITION ABOVE) */
.open-text {
    display: inline-block;
    background: white;
    padding: 10px 25px;
    border-radius: 25px;
    font-size: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.15);
    font-weight: 500;
    margin-bottom: 15px;
}

/* BIGGER Envelope */
.envelope {
    position: relative;
    width: 340px;
    height: 220px;
    background: #f0f0f0;
    border-radius: 18px;
    margin-left: auto;
    margin-right: auto;
    cursor: pointer;
    box-shadow: 0 20px 45px rgba(0,0,0,0.25);
}    
    
.flap {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #f8a5a5;
    clip-path: polygon(0 0, 100% 0, 50% 65%);
    transform-origin: top;
    transition: 0.7s;
}

.envelope.open .flap {
    transform: rotateX(180deg);
}

/* Open Me label */
.open-text {
    position: absolute;
    top: -30px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    padding: 10px 25px;
    border-radius: 25px;
    font-size: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.15);
    font-weight: 500;
}

/* Card */
.card {
    display: none;
    margin: 50px auto;
    width: 360px;
    background: #f0f0f0;
    padding: 30px;
    border-radius: 25px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

/* Title */
.title {
    font-family: 'Great Vibes', cursive;
    font-size: 36px;
    color: #e91e63;
    margin-bottom: 10px;
}

/* Ring */
.ring {
    font-size: 40px;
    margin: 10px 0;
}

/* Typing text */
.typing {
    min-height: 22px;
    margin: 8px 0;
    font-size: 16px;
}

/* Countdown */
#countdown {
    margin: 12px 0;
}

/* Button */
.location-btn {
    margin: 15px 0;
    background: #e91e63;
    color: white;
    padding: 10px 22px;
    border-radius: 25px;
    display: inline-block;
    text-decoration: none;
}

/* Divider */
hr {
    margin: 20px 0;
}

/* RSVP */
button {
    margin: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    background: #e91e63;
    color: white;
    font-weight: 500;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

/* Counters */
.counter {
    position: fixed;
    top: 10px;
    font-weight: bold;
}
#yesCount { left: 15px; }
#noCount { right: 15px; }

/* Hearts */
.heart {
    position: fixed;
    bottom: -10px;
    width: 12px;
    height: 12px;
    background: red;
    transform: rotate(45deg);
    animation: float 6s linear infinite;
}

.heart::before,
.heart::after {
    content: "";
    position: absolute;
    width: 12px;
    height: 12px;
    background: red;
    border-radius: 50%;
}

.heart::before { top: -6px; left: 0; }
.heart::after { left: -6px; top: 0; }

@keyframes float {
    from { transform: translateY(0) rotate(45deg); }
    to { transform: translateY(-100vh) rotate(45deg); }
}
</style>

</head>

<body>

<div id="yesCount" class="counter">0</div>
<div id="noCount" class="counter">0</div>

<div class="envelope" onclick="openEnvelope()">
    <div class="open-text">💌 Tap to Open</div>
    <div class="flap"></div>
</div>

<div id="card" class="card">

    <div class="title">Karim & Mai Engagement</div>

    <div class="ring">💍❤️</div>

    <div id="line1" class="typing"></div>
    <div id="line2" class="typing"></div>
    <div id="line3" class="typing"></div>
    <div id="line4" class="typing"></div>

    <div id="countdown"></div>

    <a class="location-btn" href="https://maps.app.goo.gl/DCoZfnU6cCvsSjgy9" target="_blank">
        View Location
    </a>

    <hr>

    <div><b>Will you join us?</b></div>

    <button onclick="coming()">I’m coming ❤️</button>
    <button onclick="notComing()">Can’t make it 😔</button>

</div>

<script>
let yes = 0;
let no = 0;
let typed = false;

function openEnvelope() {
    document.querySelector('.envelope').classList.add('open');
    setTimeout(() => {
        document.getElementById('card').style.display = 'block';
        if (!typed) {
        startTyping();
        typed = true;
    }
}

/* Typing */
function typeLine(id, text, delay) {
    let i = 0;
    setTimeout(() => {
        let interval = setInterval(() => {
            document.getElementById(id).innerHTML += text.charAt(i);
            i++;
            if (i >= text.length) clearInterval(interval);
        }, 35);
    }, delay);
}

function startTyping() {
    typeLine("line1", "With joy in our hearts,", 0);
    typeLine("line2", "we invite you to celebrate our engagement 💖", 1500);
    typeLine("line3", "📅 April 18, 2026", 3500);
    typeLine("line4", "📍 Cairo, Egypt, Galaa club, the view venue", 5000);
}

/* RSVP */
function coming() {
    yes++;
    document.getElementById("yesCount").innerText = yes;
    alert("We’re so excited to see you ❤️");
}

function notComing() {
    no++;
    document.getElementById("noCount").innerText = no;
    alert("You’ll be missed 😔");
}

/* Countdown */
const eventDate = new Date("April 18, 2026 00:00:00").getTime();

setInterval(() => {
    const now = new Date().getTime();
    const diff = eventDate - now;

    const d = Math.floor(diff / (1000*60*60*24));
    const h = Math.floor((diff / (1000*60*60)) % 24);
    const m = Math.floor((diff / (1000*60)) % 60);

    document.getElementById("countdown").innerHTML =
        "⏳ " + d + " days " + h + " hrs " + m + " min";
}, 1000);

/* Hearts */
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}, 300);
</script>

</body>
</html>
