<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karim & Mai Engagement 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #fceff9, #fdf6f0);
  text-align: center;
  overflow-x: hidden;
}

/* Secret counter */
#secretCounter {
  position: fixed;
  top: 10px;
  left: 10px;
  font-size: 13px;
  opacity: 0.5;
}

/* Envelope */
.envelope {
  width: 220px;
  height: 140px;
  background: white;
  margin: 150px auto 0;
  position: relative;
  cursor: pointer;
  border-radius: 12px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.15);
}

/* Funny smooth flap */
.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  clip-path: polygon(0 0, 50% 55%, 100% 0);
  transform-origin: top;
  transition: transform 0.7s cubic-bezier(.68,-0.6,.32,1.6);
}

.envelope.open .flap {
  transform: rotateX(-180deg);
}

/* Card sliding out */
.inner-card {
  position: absolute;
  width: 90%;
  left: 5%;
  top: 20px;
  background: white;
  padding: 15px;
  border-radius: 10px;
  transform: translateY(80%);
  transition: transform 0.8s ease;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.envelope.open .inner-card {
  transform: translateY(-110%);
}

/* Main card */
.card {
  width: 90%;
  max-width: 400px;
  background: white;
  margin: 20px auto;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.15);
  display: none;
}

.show {
  display: block;
  animation: fadeIn 1.2s;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 36px;
  color: #e91e63;
}

/* Buttons */
button {
  padding: 10px 18px;
  border: none;
  background: #e91e63;
  color: white;
  border-radius: 20px;
  cursor: pointer;
  margin: 5px;
}

/* Countdown */
#countdown {
  margin-top: 10px;
}

/* Floating hearts */
.heart {
  position: fixed;
  bottom: -10px;
  animation: float 6s linear infinite;
}

@keyframes float {
  to { transform: translateY(-110vh); }
}

</style>
</head>

<body>

<div id="secretCounter">• <span id="count">0</span></div>

<div class="envelope" onclick="openEnvelope(this)">
  <div class="flap"></div>
  <div class="inner-card">💌 Open Me</div>
</div>

<div id="card" class="card">
  <h1>Karim & Mai Engagement 💍</h1>

  <p id="message"></p>

  <p><strong>📅 April 18, 2026</strong></p>
  <p><strong>📍 Cairo, Egypt</strong></p>

  <div id="countdown"></div>

  <br>
  <button onclick="showMap()">View Location</button>

  <hr>

  <h3>Will you join us?</h3>
  <button onclick="rsvp(true)">I’m coming ❤️</button>
  <button onclick="rsvp(false)">Can’t make it 😔</button>

  <p id="responseMsg"></p>
</div>

<script>

// Counter
let count = localStorage.getItem("count") || 0;
document.getElementById("count").innerText = count;

// RSVP
function rsvp(isComing){
  if(localStorage.getItem("answered")) return;
  localStorage.setItem("answered",true);

  if(isComing){
    count++;
    localStorage.setItem("count",count);
    document.getElementById("count").innerText = count;

    document.getElementById("responseMsg").innerText =
    "OOOH YEAH 😍🔥 Can't wait to see you there!!";
  }else{
    document.getElementById("responseMsg").innerText =
    "We’ll miss you so much 😢💔 hope to see you soon!";
  }
}

// Open envelope
function openEnvelope(el){
  el.classList.add("open");

  setTimeout(()=>{
    document.getElementById("card").classList.add("show");
    typeText();
    startHearts();
    startCountdown();
  },800);
}

// Typewriter FIXED
let text = "With joy in our hearts, we invite you to celebrate our engagement!";
let i = 0;

function typeText(){
  let el = document.getElementById("message");
  el.innerHTML="";
  i=0;

  function type(){
    if(i < text.length){
      el.innerHTML += text.charAt(i);
      i++;
      setTimeout(type, 35);
    }
  }
  type();
}

// Hearts
function startHearts(){
  setInterval(()=>{
    let heart = document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";
    heart.style.left = Math.random()*100+"vw";
    heart.style.fontSize = (10+Math.random()*20)+"px";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),6000);
  },400);
}

// Countdown
function startCountdown(){
  let date = new Date("April 18, 2026 20:00:00").getTime();

  setInterval(()=>{
    let now = new Date().getTime();
    let diff = date-now;

    let d = Math.floor(diff/(1000*60*60*24));
    let h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    let m = Math.floor((diff%(1000*60*60))/(1000*60));

    document.getElementById("countdown").innerHTML =
    "⏳ "+d+" days "+h+" hrs "+m+" min";
  },1000);
}

// Map
function showMap(){
  window.open("https://maps.google.com?q=Cairo","_blank");
}

</script>

</body>
</html>
