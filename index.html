<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karim & Mai Engagement 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #fceff9, #e0c3fc);
  overflow-x: hidden;
  text-align: center;
}

/* Secret counter */
#secretCounter {
  position: fixed;
  top: 10px;
  left: 10px;
  font-size: 14px;
  opacity: 0.6;
}

/* Envelope */
.envelope {
  width: 220px;
  height: 140px;
  background: #fff;
  margin: 150px auto 0;
  position: relative;
  cursor: pointer;
  border-radius: 10px;
  perspective: 1000px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  overflow: hidden;
}

.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #ffb6c1;
  clip-path: polygon(0 0, 50% 50%, 100% 0);
  transform-origin: top;
  transition: transform 0.8s ease;
  z-index: 2;
}

.envelope.open .flap {
  transform: rotateX(-180deg);
}

/* Card inside envelope */
.inner-card {
  position: absolute;
  width: 90%;
  left: 5%;
  top: 20px;
  background: white;
  padding: 15px;
  border-radius: 10px;
  transform: translateY(100%);
  transition: transform 1s ease;
  z-index: 1;
}

.envelope.open .inner-card {
  transform: translateY(-120%);
}

/* Full card after animation */
.card {
  width: 90%;
  max-width: 400px;
  background: white;
  margin: 20px auto;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  display: none;
}

.show {
  display: block;
  animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(30px);}
  to {opacity:1; transform: translateY(0);}
}

h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 34px;
  color: #e91e63;
}

/* Hearts */
.heart {
  position: fixed;
  bottom: -10px;
  font-size: 20px;
  animation: float 6s linear infinite;
}

@keyframes float {
  to { transform: translateY(-110vh); }
}

/* Buttons */
button {
  padding: 10px 20px;
  border: none;
  background: #e91e63;
  color: white;
  border-radius: 20px;
  cursor: pointer;
  margin: 5px;
}

/* Countdown */
#countdown {
  margin-top: 15px;
  font-size: 18px;
}

#musicBtn {
  position: fixed;
  top: 10px;
  right: 10px;
}
</style>
</head>

<body>

<div id="secretCounter">• <span id="count">0</span></div>

<div class="envelope" onclick="openEnvelope(this)">
  <div class="flap"></div>

  <div class="inner-card">
    💌 Invitation
  </div>
</div>

<div id="card" class="card">
  <h1>Karim & Mai Engagement 💍</h1>

  <p id="message"></p>

  <p><strong>📅 Date:</strong> April 18, 2026</p>
  <p><strong>📍 Location:</strong> Cairo, Egypt</p>

  <div id="countdown"></div>

  <br>
  <button onclick="showMap()">View Location</button>

  <hr>

  <h3>Will you join us?</h3>
  <button onclick="rsvp(true)">I’m coming ❤️</button>
  <button onclick="rsvp(false)">Can’t make it 😔</button>

  <p id="responseMsg"></p>
</div>

<button id="musicBtn" onclick="toggleMusic()">🔊</button>

<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<script>

// Counter
let count = localStorage.getItem("count") || 0;
document.getElementById("count").innerText = count;

// RSVP
function rsvp(isComing) {
  if (localStorage.getItem("answered")) return;

  localStorage.setItem("answered", true);

  if (isComing) {
    count++;
    localStorage.setItem("count", count);
    document.getElementById("count").innerText = count;

    document.getElementById("responseMsg").innerText =
      "OOOH YEAH 😍🔥 We can't wait to party with you!! 🎉❤️";
  } else {
    document.getElementById("responseMsg").innerText =
      "Aww we'll miss you so much 😢💔 hope to see you soon ❤️";
  }
}

// Open animation
function openEnvelope(el) {
  el.classList.add("open");

  setTimeout(() => {
    document.getElementById("card").classList.add("show");
    typeMessage();
    startHearts();
    startCountdown();
    music.play();
    setTimeout(confetti, 2000);
  }, 1200);
}

// Typewriter
let text = "With joy in our hearts, we invite you to celebrate our engagement...";
let i = 0;
function typeMessage() {
  let speed = 40;
  function type() {
    if (i < text.length) {
      document.getElementById("message").innerHTML += text.charAt(i);
      i++;
      setTimeout(type, speed);
    }
  }
  type();
}

// Hearts
function startHearts() {
  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
  }, 300);
}

// Countdown
function startCountdown() {
  let date = new Date("April 18, 2026 20:00:00").getTime();
  setInterval(() => {
    let now = new Date().getTime();
    let diff = date - now;

    let d = Math.floor(diff / (1000*60*60*24));
    let h = Math.floor((diff % (1000*60*60*24))/(1000*60*60));
    let m = Math.floor((diff % (1000*60*60))/(1000*60));

    document.getElementById("countdown").innerHTML =
      "⏳ " + d + " days " + h + " hrs " + m + " min";
  }, 1000);
}

// Map
function showMap() {
  window.open("https://maps.google.com?q=Cairo", "_blank");
}

// Music
let music = document.getElementById("music");
function toggleMusic() {
  if (music.paused) music.play();
  else music.pause();
}

// Confetti
function confetti() {
  for (let i = 0; i < 50; i++) {
    let conf = document.createElement("div");
    conf.innerHTML = "🎉";
    conf.style.position = "fixed";
    conf.style.left = Math.random()*100+"vw";
    conf.style.top = "-10px";
    conf.style.animation = "fall 3s linear";
    document.body.appendChild(conf);
    setTimeout(()=>conf.remove(),3000);
  }
}

let style = document.createElement('style');
style.innerHTML = `@keyframes fall { to { transform: translateY(110vh); } }`;
document.head.appendChild(style);

</script>

</body>
</html>
